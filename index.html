<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪代码判题系统 - 题库</title>
    <style>
        :root { --bg-color: #121212; --panel-bg: #1e1e1e; --border-color: #333; --text-color: #d4d4d4; --btn-bg: #2da44e; --btn-hover: #2c974b; --btn-alt: #0e639c; }
        body { margin: 0; padding: 4vh 6vw; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); }
        .container { max-width: 1000px; margin: 0 auto; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        .problem-list { border-collapse: collapse; width: 100%; }
        .problem-list th, .problem-list td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color); }
        .problem-list th { color: #858585; font-weight: normal; }
        .problem-list tr:hover { background-color: #2a2d2e; }
        button { background: var(--btn-bg); color: white; border: none; padding: 6px 16px; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background 0.2s; }
        button:hover { background: var(--btn-hover); }
        .btn-alt { background: var(--btn-alt); }
        .btn-alt:hover { background: #1177bb; }
        .score-value { font-weight: 700; }
        .stat { color: #858585; font-size: 13px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; justify-content: center; align-items: center; }
.modal { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 24px; width: 90%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.modal h3 { margin-top: 0; color: #f14c4c; }
.modal-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
.btn-danger { background: #f14c4c; color: white; border: none; padding: 6px 16px; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background 0.2s; }
.btn-danger:hover { background: #d32f2f; }
.btn-secondary { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); padding: 6px 16px; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background 0.2s; }
.btn-secondary:hover { background: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>题目列表</h2>
            <div>
<button class="btn-alt" onclick="window.OJTools.exportData()">导出进度</button>
    <button class="btn-alt" onclick="document.getElementById('import-file').click()">导入进度</button>
    <button class="btn-alt" onclick="location.href='progress.html'">进度修改</button>
    <input type="file" id="import-file" style="display: none;" accept=".json" onchange="handleImport(event)">
            </div>
        </div>
        <table class="problem-list">
            <thead>
                <tr>
                    <th>题目</th>
                    <th>提交次数</th>
                    <th>上次正确率</th>
                    <th>平均正确率</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="list-body"></tbody>
        </table>
    </div>

    <div class="modal-overlay" id="clear-modal">
    <div class="modal">
        <h3>警告：清除所有进度</h3>
        <p>此操作将删除所有题目的提交记录和正确率，且不可恢复。</p>
        <p>建议在清除前备份您的进度数据。</p>
        <div class="modal-actions">
            <button class="btn-alt" onclick="window.OJTools.exportData()">导出进度</button>
            <button class="btn-secondary" onclick="hideClearModal()">取消</button>
            <button class="btn-danger" onclick="confirmClear()">确认清除</button>
        </div>
    </div>
</div>

    <script src="data.js"></script>
    <script src="tools.js"></script>
    <script>
        function renderList() {
            const tbody = document.getElementById('list-body');
            tbody.innerHTML = '';

            function renderAccuracyCell(score) {
                if (score === null) {
                    return '-';
                }
                const color = window.OJTools.getAccuracyColor(score);
                return `<span class="score-value" style="color:${color};">${score}%</span>`;
            }
            
            window.PROBLEM_LIST.forEach(prob => {
                const stats = window.OJTools.getStats(prob.id);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${prob.title}</strong></td>
                    <td>${stats.count}</td>
                    <td>${renderAccuracyCell(stats.last)}</td>
                    <td>${renderAccuracyCell(stats.avg)}</td>
                    <td><button onclick="location.href='problem.html?id=${prob.id}'">开始答题</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            window.OJTools.importData(file, (err) => {
                if (err) alert('导入失败，JSON格式错误');
                else renderList();
                event.target.value = ''; // Reset input
            });
        }

        renderList();

        function showClearModal() {
        document.getElementById('clear-modal').style.display = 'flex';
    }

    function hideClearModal() {
        document.getElementById('clear-modal').style.display = 'none';
    }

    function confirmClear() {
        window.OJTools.clearAllRecords();
        hideClearModal();
        renderList(); // 清除后重新渲染空列表
    }
    </script>
</body>
</html>
