<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪代码判题系统 (Pseudo OJ)</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --border-color: #333;
            --text-color: #d4d4d4;
            --btn-bg: #2da44e;
            --btn-hover: #2c974b;
        }

        /* 增加全局边距设定 */
        body {
            margin: 0;
            padding: 4vh 6vw;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* 容器用于包裹核心区域，实现内聚和圆角 */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 50%;
        }

        .panel-left {
            border-right: 1px solid var(--border-color);
        }

        .header {
            padding: 10px 20px;
            background: #252526;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
        }

        .content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            box-sizing: border-box;
        }

        #editor-container {
            flex: 1;
            width: 100%;
        }

        button {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 6px 16px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--btn-hover);
        }

        /* Diff 视图高度保真样式 */
        .diff-view {
            font-family: Consolas, "Courier New", monospace;
            white-space: pre; /* 使用 pre 严格保留换行和空格 */
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.5;
            background: #000;
            padding: 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .diff-added { background-color: rgba(241, 76, 76, 0.4); text-decoration: line-through; }
        .diff-removed { background-color: rgba(35, 209, 96, 0.4); }
        .diff-match { color: #cccccc; }

        .metric {
            font-size: 18px;
            margin-bottom: 16px;
            padding: 10px;
            background: #2b2b2b;
            border-left: 4px solid var(--btn-bg);
            border-radius: 4px;
        }

        /* 移动端适配：移除外边距并切换 Flex 方向 */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            .app-container {
                flex-direction: column;
                border-radius: 0;
                border: none;
            }
            .panel {
                width: 100%;
                height: 50%;
                border-right: none;
            }
            .panel-left {
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="panel panel-left" id="left-panel">
            <div class="header">
                <h3 id="problem-title" style="margin: 0; font-size: 16px;">加载中...</h3>
            </div>
            <div class="content" id="problem-content">
                </div>
        </div>

        <div class="panel panel-right">
            <div class="header">
                <span id="lang-label" style="font-size: 14px; font-weight: bold; color: #858585;">Python</span>
                <button onclick="submitCode()">提交运行</button>
            </div>
            <div id="editor-container"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    
    <script>
        const config = window.PROBLEM_DATA;
        let originalProblemHTML = '';

        // DOM 初始化
        function initPage() {
            document.getElementById('problem-title').innerText = config.title;
            const contentDiv = document.getElementById('problem-content');
            contentDiv.innerHTML = config.descriptionHTML;
            originalProblemHTML = contentDiv.innerHTML;
            document.getElementById('lang-label').innerText = config.language.charAt(0).toUpperCase() + config.language.slice(1);
        }

        // 初始化 Monaco Editor
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            initPage();
            window.editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: config.initialCode,
                language: config.language,
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                scrollBeyondLastLine: false
            });
        });

        function submitCode() {
            const userCode = window.editor.getValue();
            const expected = config.expectedCode;

            const strippedExpected = expected.replace(/\s+/g, '');
            const strippedUser = userCode.replace(/\s+/g, '');

            const diff = Diff.diffChars(strippedExpected, strippedUser);

            let diffHTML = '';
            let matchCount = 0;
            let expectedPtr = 0; // 同步原格式字符串的指针

            // 双指针还原逻辑：映射 diff 结果与原始标准答案的词法结构
            diff.forEach((part) => {
                if (part.added) {
                    diffHTML += `<span class="diff-added">${escapeHTML(part.value)}</span>`;
                } else {
                    let chunkStr = '';
                    let charsConsumed = 0;
                    
                    // 当匹配或缺失时，从原始 expected 字符串中提取包含格式的子串
                    while (charsConsumed < part.value.length && expectedPtr < expected.length) {
                        const char = expected[expectedPtr];
                        chunkStr += char;
                        if (!/\s/.test(char)) {
                            charsConsumed++;
                        }
                        expectedPtr++;
                    }
                    
                    if (part.removed) {
                        diffHTML += `<span class="diff-removed">${escapeHTML(chunkStr)}</span>`;
                    } else {
                        diffHTML += `<span class="diff-match">${escapeHTML(chunkStr)}</span>`;
                        matchCount += part.value.length;
                    }
                }
            });

            // 捕获尾随空白符
            let trailing = '';
            while (expectedPtr < expected.length && /\s/.test(expected[expectedPtr])) {
                trailing += expected[expectedPtr];
                expectedPtr++;
            }
            if (trailing) diffHTML += `<span>${escapeHTML(trailing)}</span>`;

            const accuracy = ((matchCount / strippedExpected.length) * 100).toFixed(2);

            document.getElementById('problem-content').innerHTML = `
                <div class="metric">
                    代码结构拟合率: <strong style="color: ${accuracy >= 80 ? '#2da44e' : '#f14c4c'}">${accuracy}%</strong>
                </div>
                <div style="margin-bottom: 10px; font-size: 13px; color: #858585;">
                    <span style="display:inline-block; width:12px; height:12px; background:rgba(241,76,76,0.4); margin-right:5px; vertical-align:middle;"></span>冗余输入
                    <span style="display:inline-block; width:12px; height:12px; background:rgba(35,209,96,0.4); margin-right:5px; margin-left: 15px; vertical-align:middle;"></span>缺失结构
                </div>
                <div class="diff-view">${diffHTML}</div>
                <button style="margin-top: 20px; background: #0e639c;" onclick="resetView()">← 返回题目</button>
            `;
        }

        function resetView() {
            document.getElementById('problem-content').innerHTML = originalProblemHTML;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>
</html>
