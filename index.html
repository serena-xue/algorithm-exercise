<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪代码判题系统 - 主页</title>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --border-color: #333;
            --text-color: #d4d4d4; --btn-bg: #2da44e; --btn-hover: #2c974b;
        }
        body {
            margin: 0; padding: 4vh 6vw;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .table-container {
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 8px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 20px; border-bottom: 1px solid var(--border-color); }
        th { background: #252526; font-weight: 600; color: #858585; }
        tr:hover { background: #2a2a2b; }
        a.problem-link { color: #58a6ff; text-decoration: none; font-weight: bold; }
        a.problem-link:hover { text-decoration: underline; }
        button {
            background: var(--btn-bg); color: white; border: none;
            padding: 8px 16px; cursor: pointer; border-radius: 6px; font-weight: 600;
        }
        button:hover { background: var(--btn-hover); }
        .btn-secondary { background: #21262d; border: 1px solid rgba(240,246,252,0.1); }
        .btn-secondary:hover { background: #30363d; }
    </style>
</head>
<body>
    <div class="header">
        <h2>题目列表</h2>
        <div>
            <input type="file" id="import-file" style="display: none;" accept=".json">
            <button class="btn-secondary" onclick="document.getElementById('import-file').click()">导入进度</button>
            <button class="btn-secondary" onclick="OJTools.exportData()">导出进度</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>状态</th>
                    <th>题目</th>
                    <th>提交次数</th>
                    <th>上次正确率</th>
                    <th>平均正确率</th>
                </tr>
            </thead>
            <tbody id="problem-list"></tbody>
        </table>
    </div>

    <script src="data.js"></script>
    <script src="tools.js"></script>
    <script>
        function renderTable() {
            const tbody = document.getElementById('problem-list');
            tbody.innerHTML = '';
            
            for (const [id, problem] of Object.entries(window.PROBLEM_DATA)) {
                const record = OJTools.getRecord(id);
                const isAttempted = record.submissions > 0;
                const lastAcc = isAttempted ? `${record.lastAccuracy}%` : '-';
                const avgAcc = isAttempted ? `${record.avgAccuracy}%` : '-';
                const statusIcon = record.lastAccuracy >= 100 ? '✅' : (isAttempted ? '🔄' : '📝');

                tbody.innerHTML += `
                    <tr>
                        <td>${statusIcon}</td>
                        <td><a class="problem-link" href="problem.html?id=${id}">${problem.title}</a></td>
                        <td>${record.submissions}</td>
                        <td style="color: ${record.lastAccuracy >= 100 ? '#2da44e' : 'inherit'}">${lastAcc}</td>
                        <td>${avgAcc}</td>
                    </tr>
                `;
            }
        }

        document.getElementById('import-file').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                OJTools.importData(e.target.files[0], (success) => {
                    if (success) {
                        alert("导入成功");
                        renderTable();
                    } else {
                        alert("导入失败，请检查文件格式");
                    }
                    e.target.value = ''; // Reset input
                });
            }
        });

        renderTable();
    </script>
</body>
</html>
