<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题界面</title>
    <style>
        :root { --bg-color: #121212; --panel-bg: #1e1e1e; --border-color: #333; --text-color: #d4d4d4; --btn-bg: #2da44e; --btn-hover: #2c974b; }
        body { margin: 0; padding: 4vh 6vw; display: flex; height: 100vh; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); }
        .app-container { display: flex; width: 100%; height: 100%; background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); }
        .panel { flex: 1; display: flex; flex-direction: column; width: 50%; }
        .panel-left { border-right: 1px solid var(--border-color); }
        .header { padding: 10px 20px; background: #252526; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; height: 40px; }
        .content { padding: 20px; overflow-y: auto; flex: 1; box-sizing: border-box; }
        #editor-container { flex: 1; width: 100%; }
        button { background: var(--btn-bg); color: white; border: none; padding: 6px 16px; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background 0.2s; }
        button:hover { background: var(--btn-hover); }
        .btn-back { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
        .btn-back:hover { background: #333; }
        .diff-view { font-family: Consolas, monospace; white-space: pre-wrap; word-break: break-all; font-size: 14px; line-height: 1.5; background: #000; padding: 16px; border-radius: 6px; border: 1px solid var(--border-color); }
        .diff-added { background-color: rgba(241, 76, 76, 0.4); text-decoration: line-through; }
        .diff-removed { background-color: rgba(35, 209, 96, 0.4); }
        .diff-match { color: #cccccc; }
        .metric { font-size: 18px; margin-bottom: 16px; padding: 10px; background: #2b2b2b; border-left: 4px solid var(--btn-bg); border-radius: 4px; }
        @media (max-width: 768px) { body { padding: 0; } .app-container { flex-direction: column; border-radius: 0; border: none; } .panel { width: 100%; height: 50%; border-right: none; } .panel-left { border-bottom: 1px solid var(--border-color); } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="panel panel-left" id="left-panel">
            <div class="header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button class="btn-back" onclick="location.href='index.html'">返回题库</button>
                    <h3 id="problem-title" style="margin: 0; font-size: 16px;">加载中...</h3>
                </div>
            </div>
            <div class="content" id="problem-content"></div>
        </div>
        <div class="panel panel-right">
            <div class="header">
                <span id="lang-label" style="font-size: 14px; font-weight: bold; color: #858585;">Python</span>
                <button onclick="submitCode()">提交运行</button>
            </div>
            <div id="editor-container"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="tools.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const problemId = urlParams.get('id');
        const config = window.PROBLEM_LIST.find(p => p.id === problemId);

        if (!config) {
            document.body.innerHTML = '<h2 style="padding: 20px;">题目未找到，请返回主页。</h2>';
        }

        let originalProblemHTML = '';

        function initPage() {
            document.getElementById('problem-title').innerText = config.title;
            const contentDiv = document.getElementById('problem-content');
            contentDiv.innerHTML = config.descriptionHTML;
            originalProblemHTML = contentDiv.innerHTML;
        }

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            if(!config) return;
            initPage();
            window.editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: config.initialCode,
                language: config.language,
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                scrollBeyondLastLine: false
            });
        });

        /**
 * 将格式化代码转换为适用于 JSON Value 的字符串
 * @param {string} code - 原始格式化代码
 * @returns {string} - 经过转义处理的字符串
 */
function formatCodeForJson(code) {
    // 使用 JSON.stringify 处理转义逻辑
    // 该方法会自动将换行符转为 \n，并处理引号等特殊字符
    const jsonEscaped = JSON.stringify(code);
    
    // 如果只需要获取 JSON 内部的值（去掉首尾的双引号），可以进行切片
    return jsonEscaped.substring(1, jsonEscaped.length - 1);
}

        function submitCode() {
            const userCode = window.editor.getValue();
            const expected = formatCodeForJson(config.expectedCode);
           // 改为单词级匹配，保留空格以维持严格格式对齐
    const diff = Diff.diffWordsWithSpace(expected, userCode);

    let diffHTML = '';
    let matchTokenCount = 0;
    let expectedTokenCount = 0;

    diff.forEach((part) => {
        if (part.added) {
            diffHTML += `<span class="diff-added">${escapeHTML(part.value)}</span>`;
        } else if (part.removed) {
            diffHTML += `<span class="diff-removed">${escapeHTML(part.value)}</span>`;
            expectedTokenCount += part.count; // 累加标准答案的 Token 数
        } else {
            diffHTML += `<span class="diff-match">${escapeHTML(part.value)}</span>`;
            matchTokenCount += part.count;    // 累加匹配的 Token 数
            expectedTokenCount += part.count; 
        }
    });

    // 正确率计算改为单词/Token级
    const accuracy = ((matchTokenCount / expectedTokenCount) * 100).toFixed(2);

            document.getElementById('problem-content').innerHTML = `
                <div class="metric">
                    严格匹配正确率: <strong style="color: ${accuracy >= 100 ? '#2da44e' : '#f14c4c'}">${accuracy}%</strong>
                </div>
                <div style="margin-bottom: 10px; font-size: 13px; color: #858585;">
                    <span style="display:inline-block; width:12px; height:12px; background:rgba(241,76,76,0.4); margin-right:5px; vertical-align:middle;"></span>冗余字符/格式
                    <span style="display:inline-block; width:12px; height:12px; background:rgba(35,209,96,0.4); margin-right:5px; margin-left: 15px; vertical-align:middle;"></span>缺失字符/格式
                </div>
                <div class="diff-view">${diffHTML}</div>
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button style="background: #0e639c;" onclick="resetView()">重新答题</button>
                    <button style="background: #333;" onclick="location.href='index.html'">返回题库</button>
                </div>
            `;
        }

        function resetView() {
            document.getElementById('problem-content').innerHTML = originalProblemHTML;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
