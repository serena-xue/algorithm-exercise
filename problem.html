<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题界面</title>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --border-color: #333;
            --text-color: #d4d4d4; --btn-bg: #2da44e; --btn-hover: #2c974b;
        }
        body {
            margin: 0; padding: 4vh 6vw; display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
        }
        .nav-header { margin-bottom: 10px; }
        .nav-header a { color: #58a6ff; text-decoration: none; font-size: 14px; }
        .nav-header a:hover { text-decoration: underline; }
        
        .app-container {
            display: flex; width: 100%; flex: 1; background-color: var(--panel-bg);
            border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        .panel { flex: 1; display: flex; flex-direction: column; width: 50%; }
        .panel-left { border-right: 1px solid var(--border-color); }
        .header {
            padding: 10px 20px; background: #252526; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; height: 40px;
        }
        .content { padding: 20px; overflow-y: auto; flex: 1; box-sizing: border-box; }
        #editor-container { flex: 1; width: 100%; }
        
        button {
            background: var(--btn-bg); color: white; border: none;
            padding: 6px 16px; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 14px;
        }
        button:hover { background: var(--btn-hover); }

        .diff-view {
            font-family: Consolas, "Courier New", monospace;
            white-space: pre-wrap; word-break: break-all; font-size: 14px; line-height: 1.5;
            background: #000; padding: 16px; border-radius: 6px; border: 1px solid var(--border-color);
        }
        .diff-added { background-color: rgba(241, 76, 76, 0.4); text-decoration: line-through; }
        .diff-removed { background-color: rgba(35, 209, 96, 0.4); }
        .diff-match { color: #cccccc; }
        .metric { font-size: 18px; margin-bottom: 16px; padding: 10px; background: #2b2b2b; border-left: 4px solid var(--btn-bg); border-radius: 4px; }

        @media (max-width: 768px) {
            body { padding: 0; }
            .nav-header { padding: 10px; margin: 0; background: var(--panel-bg); }
            .app-container { flex-direction: column; border-radius: 0; border: none; }
            .panel { width: 100%; height: 50%; border-right: none; }
            .panel-left { border-bottom: 1px solid var(--border-color); }
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html">← 返回题目列表</a>
    </div>

    <div class="app-container">
        <div class="panel panel-left" id="left-panel">
            <div class="header">
                <h3 id="problem-title" style="margin: 0; font-size: 16px;">加载中...</h3>
            </div>
            <div class="content" id="problem-content"></div>
        </div>
        <div class="panel panel-right">
            <div class="header">
                <span id="lang-label" style="font-size: 14px; font-weight: bold; color: #858585;">Python</span>
                <button onclick="submitCode()">提交运行</button>
            </div>
            <div id="editor-container"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="tools.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const problemId = urlParams.get('id');
        const config = window.PROBLEM_DATA[problemId];
        let originalProblemHTML = '';

        if (!config) {
            document.body.innerHTML = '<h2 style="padding: 20px;">题目未找到，请<a href="index.html" style="color:#58a6ff;">返回主页</a></h2>';
        } else {
            initPage();
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
            require(['vs/editor/editor.main'], function() {
                window.editor = monaco.editor.create(document.getElementById('editor-container'), {
                    value: config.initialCode,
                    language: config.language,
                    theme: 'vs-dark',
                    automaticLayout: true,
                    minimap: { enabled: false },
                    fontSize: 14,
                    scrollBeyondLastLine: false
                });
            });
        }

        function initPage() {
            document.getElementById('problem-title').innerText = config.title;
            const contentDiv = document.getElementById('problem-content');
            contentDiv.innerHTML = config.descriptionHTML;
            originalProblemHTML = contentDiv.innerHTML;
        }

        function submitCode() {
            const userCode = window.editor.getValue();
            const expected = config.expectedCode;
            const diff = Diff.diffChars(expected, userCode);

            let diffHTML = '';
            let matchCount = 0;

            diff.forEach((part) => {
                if (part.added) {
                    diffHTML += `<span class="diff-added">${escapeHTML(part.value)}</span>`;
                } else if (part.removed) {
                    diffHTML += `<span class="diff-removed">${escapeHTML(part.value)}</span>`;
                } else {
                    diffHTML += `<span class="diff-match">${escapeHTML(part.value)}</span>`;
                    matchCount += part.value.length;
                }
            });

            const accuracy = ((matchCount / expected.length) * 100).toFixed(2);
            
            // 调用 tools.js 持久化存储
            OJTools.saveSubmission(problemId, accuracy);

            document.getElementById('problem-content').innerHTML = `
                <div class="metric">
                    严格匹配正确率: <strong style="color: ${accuracy >= 100 ? '#2da44e' : '#f14c4c'}">${accuracy}%</strong>
                </div>
                <div style="margin-bottom: 10px; font-size: 13px; color: #858585;">
                    <span style="display:inline-block; width:12px; height:12px; background:rgba(241,76,76,0.4); margin-right:5px; vertical-align:middle;"></span>冗余字符/格式
                    <span style="display:inline-block; width:12px; height:12px; background:rgba(35,209,96,0.4); margin-right:5px; margin-left: 15px; vertical-align:middle;"></span>缺失字符/格式
                </div>
                <div class="diff-view">${diffHTML}</div>
                <button style="margin-top: 20px; background: #0e639c;" onclick="resetView()">← 返回题目</button>
            `;
        }

        function resetView() {
            document.getElementById('problem-content').innerHTML = originalProblemHTML;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
